<!DOCTYPE html>
<html>
<head>
  <title>NovaNet</title>
  <meta charset="UTF-8">
  <style>
    body {
      background: linear-gradient(135deg, #05060b, #0a0f2d);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 50px;
      text-shadow: 0 0 20px #5f8cff;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #5f8cff; }
      to { text-shadow: 0 0 30px #8f5fff; }
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      padding: 15px 30px;
      background: #5f8cff;
      color: white;
      border-radius: 10px;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 0 0 15px #5f8cff;
      transition: 0.3s;
    }

    .btn:hover {
      background: #8f5fff;
      box-shadow: 0 0 25px #8f5fff;
    }
  </style>
</head>
<body>
  <h1>Welcome to NovaNet</h1>
  <a class="btn" href="about.html">Go to About Page</a>
</body>
</html>
